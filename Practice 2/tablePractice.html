<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table border="1" cellpadding="10" cellspacing="0">
        <tr>
            <th colspan="6">Time Table</th>
        </tr>
        <tr>
            <th rowspan="6">Hours</th>
            <th>Mon</th>
            <th>Tue</th>
            <th>Wed</th>
            <th>Thu</th>
            <th>Fri</th>
         <tr>
            <td>Science</td>
            <td>Math</td>
            <td>English</td>
            <td>Hindi</td>
            <td>Arts</td>
         </tr>
            <tr>
                <td>Math</td>
                <td>Science</td>
                <td>Hindi</td>
                <td>English</td>
                <td>PE</td>
            </tr>
            <tr>
                <th colspan="5">Lunch</th>
            </tr>
            <tr>
                <td>English</td>
                <td>PE</td>
                <td>Science</td>
                <td>Math</td>
                <td>Hindi</td>
            </tr>
            <tr>
                <td>Hindi</td>
                <td>Arts</td>
                <td>PE</td>
                <td>Science</td>
                <td>Math</td>
            </tr>
    </table>
</body>
</html>
