<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>City</th>
        </tr>
        <tr>
            <td>John Doe</td>
            <td>john@example.com</td>
            <td>New York</td>
        </tr>
        <tr>
            <td>Jane Doe</td>
            <td>jane@example.com</td>
            <td>Los Angeles</td>
        </tr>
        <tr>
            <td>Jane Smith</td>
            <td>jane@example.com</td>
            <td>Los Angeles</td>
        </tr>
    </table>

    <br><br><br>

    <table border="1">
        <caption>Fruits Payment Received</caption>
        <thead>
            <tr>
                <th>Fruit</th>
                <th>Quantity</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Apple</td>
                <td>5Kg</td>
                <td>700.00</td>
            </tr>
            <tr>
                <td>Banana</td>
                <td>2</td>
                <td>100.00</td>
            </tr>
            <tr>
                <td>Orange</td>
                <td>2.5Kg</td>
                <td>150.00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Total</td>
                <td>950.00</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
