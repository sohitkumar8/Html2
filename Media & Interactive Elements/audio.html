<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Example</title>
</head>
<body>
    <h1>Audio Player</h1>
    <audio controls>
        <source src="song.mp3" type="audio/mpeg">
        YUR BROWSER DOES NOT SUPPORT THE AUDIO ELEMENT.
    </audio>

    <h1>Video Player</h1>
    <video controls width="320" height="240">
        <source src="video.mp4" type="video/mp4">
        YUR BROWSER DOES NOT SUPPORT THE VIDEO ELEMENT.
    </video>

</body>
</html>
