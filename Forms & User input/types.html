<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <H1>Forms </H1>

    <form >
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
        <br><br>
        <label for="pw">Password:</label>
        <input type="password" id="pw" name="pw" placeholder="Enter your password" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <br><br>
        <label for="number">Number:</label>
        <input type="number" id="number" name="number" placeholder="Enter your number" required>
        <br><br>
        <label for="date">Date:</label> 
        <input type="date" id="date" name="date" required>
        <br><br>
        <label for="color">Pick your favourite color:</label>
        <input type="color" id="color" name="color" value="#fff111" required>
        <br><br>
        <label for="resume">Upload your resume:</label>
        <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx">
        <br><br>
        <label ><input type="radio" name="gender" value="male">Male</label>
        <label ><input type="radio" name="gender" value="female">Female</label>
        <label ><input type="radio" name="gender" value="other">Other</label>
        <br><br>
        <p>Select Hobbies:</p>
        <label><input type="checkbox" name="hobbies" value="reading" > Reading</label>
        <label><input type="checkbox" name="hobbies" value="swimming" > Swimming</label>
        <label><input type="checkbox" name="hobbies" value="coding" > Coding</label>
        <label><input type="checkbox" name="hobbies" value="gym" > Gym</label>
        <br><br>
        <label for="volume">Volume:</label>
        <input type="range" id="volume" name="volume" min="0" max="100" value="25">
        <br><br>
        <button type="submit">Submit</button>
        <br><br>
        <button type="reset">Reset</button>
        <br><br>
        <button type="button">Click Me</button>
    </form>

    <form>
        <fieldset>
            <legend>Personal Information</legend>
            <label for="fname"> Name:</label>
            <input type="text" id="fname" name="fname" placeholder="Enter your full name" required>
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </fieldset>
        <fieldset>
            <legend>Account Details</legend>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required>
            <br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Choose a password" required>
        </fieldset>
        <br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>

    </form>
</body>
</html>
