<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>HTML Forms</h1>
    <form >
        <label for="username">Your Name: </label>
        <input type="text" id="username" name="username" placeholder="Enter your name" required>
        <br><br>

        <label for="email">Your Email: </label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

    </form>
    <!--
    1-.Always put inside a form tag
    2-.label 
    3-Connect label with input using for and id attributes
    4-.Use placeholder to give a hint to the user
    5-.Use required attribute to make the field mandatory
    6-Right input type to get the right keyboard on mobile devices (e.g., email, number, etc.)
    -->


</body>
</html>
