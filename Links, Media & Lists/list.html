<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>This is List</h1>

    <!--
        unordered list ul - bullet point
        ordered list ol - numbers
        description list dl - terms and descriptions

        ul ol - li list item
    -->
    <h3>Unordered List</h3>
    <ul>
        <li>Milk</li>
        <li>Bread</li>
        <li>Eggs</li>
    </ul>

    <h3>Ordered List</h3>
    <ol>
        <li>Go to website</li>
        <li>Register for program</li>
        <li>Start live class</li>
    </ol>

    
    <h3>Description List</h3>
    <dl>
        <dt>HTML</dt>
        <dd>The structure of web page</dd>

        <dt>CSS</dt>
        <dd>The style of web page</dd>

        <dt>JavaScript</dt>
        <dd>The brain of web page</dd>
    </dl>

</body>
</html>
